services:
  spritpreisbremse:
    build: .
    ports:
      - "8081:80"
    environment:
      - TANKERKOENIG_API_KEY=${TANKERKOENIG_API_KEY}
      - BASE_PATH=/sprit/
    volumes:
      # Persists data.json on the host so price history survives image rebuilds.
      # On first deploy, copy it out first:
      #   docker compose cp spritpreisbremse:/app/src/data.json ./data.json
      - ./data.json:/app/src/data.json
    restart: unless-stopped
