server {
    listen 80;
    server_name _;

    root /app/dist;
    index index.html;

    # index.html must never be cached — it is the entry point that references
    # all hashed assets, so stale HTML = stale app even after a rebuild.
    location = /index.html {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # SPA fallback — all unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Long-lived cache for fingerprinted assets (JS/CSS bundles have hashes in
    # their filenames, so a new build automatically busts the cache)
    location ~* \.(js|css|woff2?|svg|ico|png|jpg|jpeg)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
