services:
  spritpreisbremse:
    build: .
    ports:
      - "8081:80"
    environment:
      - TANKERKOENIG_API_KEY=${TANKERKOENIG_API_KEY}
      - BASE_PATH=/sprit/
      - DATA_DIR=/app/data
    volumes:
      # Persists data.json on the host so price history survives image rebuilds.
      # On first deploy: mkdir -p data && cp src/data.json data/
      - ./data:/app/data
    restart: unless-stopped
