server {
    listen 80;
    server_name _;

    root /app/dist;
    index index.html;

    # SPA fallback — all unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for fingerprinted assets (JS/CSS bundles have hashes)
    location ~* \.(js|css|woff2?|svg|ico|png|jpg|jpeg)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
