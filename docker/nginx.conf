server {
    listen 80;
    server_name _;

    root /app/dist;
    index index.html;

    # index.html: cache for 12 h (= cron interval), then revalidate.
    # nginx sends ETag/Last-Modified automatically — if the file hasn't changed
    # since the last build the browser gets a 304 Not Modified (no re-download).
    location = /index.html {
        try_files $uri =404;
        add_header Cache-Control "max-age=43200, must-revalidate";
    }

    # SPA fallback — unknown paths also serve index.html with the same policy.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "max-age=43200, must-revalidate";
    }

    # Long-lived cache for fingerprinted assets (JS/CSS bundles have hashes in
    # their filenames, so a new build automatically busts the cache)
    location ~* \.(js|css|woff2?|svg|ico|png|jpg|jpeg)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
